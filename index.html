<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useReducer, useMemo, useCallback, useRef } = React;
    const { ResponsiveContainer, BarChart, Bar, LineChart, Line, PieChart, Pie, Cell,
      XAxis, YAxis, CartesianGrid, Tooltip, Legend, RadarChart, Radar, PolarGrid,
      PolarAngleAxis, PolarRadiusAxis, Area, AreaChart } = Recharts;

    const GOLD = '#C8963E', GOLD_L = '#E8B75E', GOLD_D = '#9A7230', BG = '#1A1A2E',
      SURFACE = '#16213E', SURF_L = '#1F3460', BLUE = '#4F9CF7', GREEN = '#4ADE80',
      RED = '#F87171', MUTED = '#8892B0';
    const CHART_COLORS = [GOLD, BLUE, GREEN, '#A78BFA', '#FB923C', '#F472B6'];
    const TT = { contentStyle: { background: SURFACE, border: `1px solid ${GOLD}`, borderRadius: 8, fontSize: 13 }, labelStyle: { color: GOLD } };

    // ===== UTILITIES =====
    function toiSec(t) { if (!t) return 0; const p = String(t).split(':'); return (parseInt(p[0]) || 0) * 60 + (parseInt(p[1]) || 0); }
    function secToi(s) { const m = Math.floor(s / 60), ss = Math.round(s % 60); return `${m}:${ss < 10 ? '0' : ''}${ss}`; }
    function pct(a, b) { return b > 0 ? (a / b * 100) : 0; }
    function safeNum(v) { const n = Number(v); return isNaN(n) ? 0 : n; }

    function parseFileName(fn) {
      const name = fn.replace(/\.xlsx?$/i, '');
      const parts = name.split('_');
      if (parts.length < 3) throw new Error('Filnamn måste vara: Motståndare_Bjorkloven_YYYYDDMM.xlsx');
      const opp = parts[0];
      const ds = parts[parts.length - 1];
      if (ds.length !== 8) throw new Error('Datumformat i filnamn måste vara YYYYDDMM');
      const y = ds.slice(0, 4), d = ds.slice(4, 6), mo = ds.slice(6, 8);
      return { opponent: opp, date: `${y}-${mo}-${d}`, matchId: `match_${y}${mo}${d}_${opp.toLowerCase()}` };
    }

    function parseSheet(ws) {
      // Try simple single-table approach first (all players in one table)
      const simpleRows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      const goalies = [], skaters = [];

      // Check if simple approach works (has expected columns)
      const hasSkaterCols = simpleRows.length > 0 && ('G' in simpleRows[0] || 'g' in simpleRows[0] || 'POS' in simpleRows[0]);

      if (hasSkaterCols && simpleRows.some(r => r.Spelare || r.spelare || r.NR || r.Nr)) {
        // Single-table format - parse directly
        simpleRows.forEach(r => {
          if (!r.Spelare && !r.spelare && !r.NR && !r.Nr) return;
          const name = r.Spelare || r.spelare || '';
          const pos = String(r.POS || r.Pos || r.pos || '').toUpperCase().trim();
          const nr = safeNum(r.NR || r.Nr || r.nr);
          if (pos === 'GK' || pos === 'MV') {
            const soga = safeNum(r.SOGA || r.soga), svs = safeNum(r.SVS || r.svs || r.Räddningar);
            goalies.push({
              name, number: nr, line: safeNum(r.LINE || r.Line || r.line) || 1,
              ga: safeNum(r.GA || r.ga || r['Insläppta']), soga, spga: safeNum(r.SPGA || r.spga), svs,
              svsPct: r['SVS%'] != null && r['SVS%'] !== '' ? safeNum(r['SVS%']) : pct(svs, soga)
            });
          } else if (name || nr) {
            const g = safeNum(r.G || r.g), a = safeNum(r.A || r.a), fw = safeNum(r.FOW || r.fow), fl = safeNum(r.FOL || r.fol);
            const toi = r.TOI || r.toi || r['Tid'] || '0:00';
            skaters.push({
              name, number: nr, pos: pos || 'FW', line: safeNum(r.LINE || r.Line || r.line) || 1,
              goals: g, assists: a, points: g + a, ppg: safeNum(r.PPG || r.ppg),
              shotsWide: safeNum(r.SW || r.sw), pim: safeNum(r.PIM || r.pim),
              sog: safeNum(r.SOG || r.sog), ppsog: safeNum(r.PPSOG || r.ppsog),
              plusMinus: safeNum(r['+/-'] || r['Plus/Minus'] || r.plusminus),
              toi, toiSeconds: toiSec(toi), hits: safeNum(r.Hits || r.hits || r.HIT),
              fow: fw, fol: fl, foPct: r['FO%'] != null && r['FO%'] !== '' ? safeNum(r['FO%']) : pct(fw, fw + fl)
            });
          }
        });
        if (goalies.length > 0 || skaters.length > 0) {
          console.log(`[Stats Hub] Parsed (single-table): ${goalies.length} goalies, ${skaters.length} skaters`);
          return { goalies, skaters };
        }
      }

      // Multi-section format: scan raw data for header rows
      console.log('[Stats Hub] Trying multi-section parse...');
      const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

      function findHeaderRow(data, markers) {
        for (let i = 0; i < data.length; i++) {
          const row = (data[i] || []).map(c => String(c).trim().toUpperCase());
          if (markers.every(m => row.some(cell => cell === m.toUpperCase()))) return i;
        }
        return -1;
      }

      function parseSection(data, headerIdx) {
        if (headerIdx < 0 || headerIdx >= data.length) return [];
        const headers = (data[headerIdx] || []).map(c => String(c).trim());
        const rows = [];
        for (let i = headerIdx + 1; i < data.length; i++) {
          const rowData = data[i] || [];
          if (rowData.length === 0 || rowData.every(c => c === '' || c == null)) break;
          // Stop if we hit another header row (contains 'Spelare' as value in first cols)
          const firstCells = rowData.slice(0, 3).map(c => String(c).trim().toUpperCase());
          if (firstCells.includes('SPELARE') && i > headerIdx + 1) break;
          const obj = {};
          headers.forEach((h, idx) => { if (h) obj[h] = rowData[idx] != null ? rowData[idx] : ''; });
          rows.push(obj);
        }
        return rows;
      }

      // Find goalie section (look for GA or SOGA or SVS columns)
      const gkIdx = findHeaderRow(raw, ['Spelare', 'NR']);
      let skIdx = -1;

      if (gkIdx >= 0) {
        const gkHeaders = (raw[gkIdx] || []).map(c => String(c).trim().toUpperCase());
        const isGoalieHeader = gkHeaders.includes('GA') || gkHeaders.includes('SVS') || gkHeaders.includes('SOGA');

        if (isGoalieHeader) {
          // Parse goalies from this section
          const gkRows = parseSection(raw, gkIdx);
          gkRows.forEach(r => {
            const soga = safeNum(r.SOGA || r.soga), svs = safeNum(r.SVS || r.svs);
            if (r.Spelare || r.NR) goalies.push({
              name: r.Spelare || '', number: safeNum(r.NR),
              line: safeNum(r.LINE || r.Line) || 1, ga: safeNum(r.GA), soga, spga: safeNum(r.SPGA), svs,
              svsPct: r['SVS%'] != null && r['SVS%'] !== '' ? safeNum(r['SVS%']) : pct(svs, soga)
            });
          });
          // Find skater section after goalie section
          skIdx = findHeaderRow(raw.slice(gkIdx + 1), ['Spelare', 'NR']);
          if (skIdx >= 0) skIdx += gkIdx + 1;
        } else {
          // First header is skaters, try to find goalies elsewhere
          skIdx = gkIdx;
        }
      }

      if (skIdx < 0) skIdx = findHeaderRow(raw, ['Spelare', 'G']);
      if (skIdx < 0) skIdx = findHeaderRow(raw, ['Spelare', 'SOG']);

      if (skIdx >= 0) {
        const skRows = parseSection(raw, skIdx);
        skRows.forEach(r => {
          const name = r.Spelare || r.spelare || '';
          const pos = String(r.POS || r.Pos || '').toUpperCase().trim();
          const nr = safeNum(r.NR || r.Nr);
          if (!name && !nr) return;
          // If this row is actually a goalie in the skater section
          if (pos === 'GK' || pos === 'MV') {
            const soga = safeNum(r.SOGA), svs = safeNum(r.SVS);
            goalies.push({
              name, number: nr, line: safeNum(r.LINE || r.Line) || 1,
              ga: safeNum(r.GA), soga, spga: safeNum(r.SPGA), svs,
              svsPct: r['SVS%'] != null && r['SVS%'] !== '' ? safeNum(r['SVS%']) : pct(svs, soga)
            });
            return;
          }
          const g = safeNum(r.G), a = safeNum(r.A), fw = safeNum(r.FOW), fl = safeNum(r.FOL);
          const toi = r.TOI || '0:00';
          skaters.push({
            name, number: nr, pos: pos || 'FW', line: safeNum(r.LINE || r.Line) || 1,
            goals: g, assists: a, points: g + a, ppg: safeNum(r.PPG),
            shotsWide: safeNum(r.SW), pim: safeNum(r.PIM), sog: safeNum(r.SOG), ppsog: safeNum(r.PPSOG),
            plusMinus: safeNum(r['+/-']), toi, toiSeconds: toiSec(toi), hits: safeNum(r.Hits || r.HIT),
            fow: fw, fol: fl, foPct: r['FO%'] != null && r['FO%'] !== '' ? safeNum(r['FO%']) : pct(fw, fw + fl)
          });
        });
      }

      console.log(`[Stats Hub] Parsed (multi-section): ${goalies.length} goalies, ${skaters.length} skaters`);
      if (goalies.length === 0 && skaters.length === 0) {
        console.warn('[Stats Hub] No data found! Sheet contents:', raw.slice(0, 5));
      }
      return { goalies, skaters };
    }

    function teamTotals(sk, gk) {
      const t = { sog: 0, pim: 0, hits: 0, fow: 0, fol: 0, ppg: 0, goals: 0, assists: 0, points: 0, shotsWide: 0, ppsog: 0 };
      sk.forEach(s => {
        t.sog += s.sog; t.pim += s.pim; t.hits += s.hits; t.fow += s.fow; t.fol += s.fol;
        t.ppg += s.ppg; t.goals += s.goals; t.assists += s.assists; t.points += s.points; t.shotsWide += s.shotsWide; t.ppsog += s.ppsog;
      });
      t.foPct = pct(t.fow, t.fow + t.fol);
      t.ga = gk.reduce((s, g) => s + g.ga, 0); t.svs = gk.reduce((s, g) => s + g.svs, 0); t.soga = gk.reduce((s, g) => s + g.soga, 0);
      t.svsPct = pct(t.svs, t.soga);
      return t;
    }

    function groupLines(sk) {
      const lines = {};
      sk.forEach(s => { if (!lines[s.line]) lines[s.line] = []; lines[s.line].push(s); });
      return Object.entries(lines).sort((a, b) => a[0] - b[0]).map(([n, p]) => ({
        line: Number(n),
        forwards: p.filter(x => ['LW', 'CE', 'RW'].includes(x.pos)), defense: p.filter(x => ['LD', 'RD'].includes(x.pos)),
        all: p, totals: {
          plusMinus: p.reduce((s, x) => s + x.plusMinus, 0), sog: p.reduce((s, x) => s + x.sog, 0),
          pim: p.reduce((s, x) => s + x.pim, 0), goals: p.reduce((s, x) => s + x.goals, 0), hits: p.reduce((s, x) => s + x.hits, 0),
          toi: secToi(p.reduce((s, x) => s + x.toiSeconds, 0) / Math.max(p.length, 1))
        }
      }));
    }

    async function parseExcelFile(file) {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array' });
      if (wb.SheetNames.length < 2) throw new Error('Excel-filen måste ha minst 2 sheets (Björklöven + Motståndare)');
      const info = parseFileName(file.name);

      // Auto-detect which sheet is Björklöven by name
      let bjorkIdx = 0, oppIdx = 1;
      const names = wb.SheetNames.map(n => n.toLowerCase().trim());
      console.log('[Stats Hub] Sheet names:', wb.SheetNames);

      const bjorkMatch = names.findIndex(n => n.includes('björklöven') || n.includes('bjorkloven') || n.includes('bjork'));
      const oppMatch = names.findIndex(n => n.toLowerCase().includes(info.opponent.toLowerCase()));

      if (bjorkMatch >= 0 && oppMatch >= 0 && bjorkMatch !== oppMatch) {
        bjorkIdx = bjorkMatch;
        oppIdx = oppMatch;
      } else if (bjorkMatch >= 0) {
        bjorkIdx = bjorkMatch;
        oppIdx = bjorkMatch === 0 ? 1 : 0;
      } else if (oppMatch >= 0) {
        oppIdx = oppMatch;
        bjorkIdx = oppMatch === 0 ? 1 : 0;
      } else {
        // Filename format: Motståndare_Bjorkloven_DATE — opponent is first in name
        // Convention from spec: Sheet 1 = Björklöven, Sheet 2 = Opponent
        // Keep default: sheet 0 = björklöven, sheet 1 = opponent
        bjorkIdx = 0;
        oppIdx = 1;
      }

      console.log(`[Stats Hub] Using sheet ${bjorkIdx} (${wb.SheetNames[bjorkIdx]}) as Björklöven, sheet ${oppIdx} (${wb.SheetNames[oppIdx]}) as ${info.opponent}`);

      const bjork = parseSheet(wb.Sheets[wb.SheetNames[bjorkIdx]]);
      const opp = parseSheet(wb.Sheets[wb.SheetNames[oppIdx]]);
      const bjorkTotals = teamTotals(bjork.skaters, bjork.goalies);
      const oppTotals = teamTotals(opp.skaters, opp.goalies);
      return {
        id: info.matchId, date: info.date, opponent: info.opponent,
        result: { bjorkloven: bjork.skaters.reduce((s, x) => s + x.goals, 0), opponent: opp.skaters.reduce((s, x) => s + x.goals, 0) },
        bjorkloven: { goalies: bjork.goalies, skaters: bjork.skaters, totals: bjorkTotals, lines: groupLines(bjork.skaters) },
        opponentTeam: { goalies: opp.goalies, skaters: opp.skaters, totals: oppTotals, lines: groupLines(opp.skaters) },
        meta: { arena: '', round: '', overtime: false }
      };
    }

    // ===== PLAYER SEASON =====
    function buildPlayerSeasons(matches) {
      const map = {};
      matches.forEach(m => {
        m.bjorkloven.skaters.forEach(s => {
          const id = `${s.number}_${s.name.replace(/\s/g, '')}`;
          if (!map[id]) map[id] = {
            playerId: id, name: s.name, number: s.number, pos: s.pos, gamesPlayed: 0,
            totals: { goals: 0, assists: 0, points: 0, ppg: 0, pim: 0, sog: 0, plusMinus: 0, hits: 0, fow: 0, fol: 0, toiSeconds: 0, shotsWide: 0, ppsog: 0 },
            trend: [], bestMatch: null, bestPts: 0
          };
          const p = map[id]; p.gamesPlayed++; p.pos = s.pos;
          Object.keys(p.totals).forEach(k => { if (k in s) p.totals[k] += s[k]; });
          p.totals.points = p.totals.goals + p.totals.assists;
          p.trend.push({ matchId: m.id, date: m.date, opponent: m.opponent, ...s });
          if (s.points > p.bestPts) { p.bestPts = s.points; p.bestMatch = m.id; }
        });
        m.bjorkloven.goalies.forEach(g => {
          const id = `${g.number}_${g.name.replace(/\s/g, '')}_GK`;
          if (!map[id]) map[id] = {
            playerId: id, name: g.name, number: g.number, pos: 'GK', gamesPlayed: 0,
            totals: { ga: 0, soga: 0, spga: 0, svs: 0 }, trend: [], bestMatch: null, bestSvs: 0
          };
          const p = map[id]; p.gamesPlayed++;
          p.totals.ga += g.ga; p.totals.soga += g.soga; p.totals.spga += g.spga; p.totals.svs += g.svs;
          p.trend.push({ matchId: m.id, date: m.date, opponent: m.opponent, ...g });
          if (g.svs > p.bestSvs) { p.bestSvs = g.svs; p.bestMatch = m.id; }
        });
      });
      return Object.values(map);
    }

    // ===== ADVANCED ANALYTICS =====
    // Note: Complex metrics (Form, Chemistry, etc) are now pre-calculated by the Node.js backend API

    function calcProjection(p, totalGames = 7) {
      const gp = Math.max(p.gamesPlayed, 1);
      return {
        goals: Math.round(p.totals.goals / gp * totalGames),
        assists: Math.round(p.totals.assists / gp * totalGames),
        points: Math.round(p.totals.points / gp * totalGames)
      };
    }

    function radarData(p, allPlayers) {
      if (p.pos === 'GK') return [];
      const gp = Math.max(p.gamesPlayed, 1), t = p.totals;
      const skaters = allPlayers.filter(x => x.pos !== 'GK' && x.gamesPlayed > 0);
      const maxOf = (fn) => Math.max(...skaters.map(fn), 1);
      const norm = (val, max) => Math.min(Math.round(val / max * 100), 100);
      // V2 Radar Spec
      return [
        { stat: 'Scoring', value: norm(t.points / gp, maxOf(x => x.totals.points / Math.max(x.gamesPlayed, 1))) },
        { stat: 'Skottfarlighet', value: t.sog > 0 ? norm(t.goals / t.sog * 100, maxOf(x => (x.totals.goals / (x.totals.sog || 1)) * 100)) : 0 },
        { stat: 'Fysik', value: norm((t.hits / gp) * 50 + (t.sog / gp) * 50, maxOf(x => (x.totals.hits / (x.gamesPlayed || 1)) * 50 + (x.totals.sog / (x.gamesPlayed || 1)) * 50)) },
        { stat: 'Tekning', value: p.pos === 'CE' ? norm(pct(t.fow, t.fow + t.fol), 100) : 0 },
        { stat: 'Disciplin', value: Math.max(100 - (t.pim / gp * 10), 0) },
        { stat: 'Istid', value: norm(t.toiSeconds / gp, maxOf(x => x.totals.toiSeconds / Math.max(x.gamesPlayed, 1))) }
      ];
    }

    function UploadZone({ onFiles, compact }) {
      const [drag, setDrag] = useState(false);

      }, [onFiles]);
      const handleChange = useCallback(e => {
        const files = [...e.target.files].filter(f => /\.xlsx?$/i.test(f.name));

    // ===== TAB 2: SÄSONG =====
    function SeasonView({ matches, players }) {
      if (!matches.length) return <EmptyState title="Ingen säsongsdata" desc="Ladda upp matcher för att se säsongstrender" />;
      const [sortCol, setSortCol] = useState('points');
      const [sortDir, setSortDir] = useState(-1);
      const skaters = players.filter(p => p.pos !== 'GK');
      const sorted = [...skaters].sort((a, b) => (b.totals[sortCol] - a.totals[sortCol]) * sortDir);
      const doSort = col => { if (sortCol === col) setSortDir(d => d * -1); else { setSortCol(col); setSortDir(-1); } };

      const timelineData = matches.map(m => {
        const d = m.result.bjorkloven - m.result.opponent;
        return { name: m.opponent, date: m.date, diff: d, won: d > 0, bj: m.result.bjorkloven, opp: m.result.opponent };
      });
      const trendData = matches.map(m => ({ name: m.opponent, SOG: m.bjorkloven.totals.sog, Hits: m.bjorkloven.totals.hits, PIM: m.bjorkloven.totals.pim }));

      let streak = 0, streakType = '';
      for (let i = matches.length - 1; i >= 0; i--) {
        const w = matches[i].result.bjorkloven > matches[i].result.opponent;
        if (i === matches.length - 1) streakType = w ? 'W' : 'L';
      }

      const cols = [{ k: 'points', l: 'PTS' }, { k: 'goals', l: 'G' }, { k: 'assists', l: 'A' }, { k: 'sog', l: 'SOG' }, { k: 'plusMinus', l: '+/-' }, { k: 'hits', l: 'Hits' }, { k: 'pim', l: 'PIM' }];

      // --- Team Momentum (Lagmomentum) ---
      const tStats = { sog: { s: 0, m: 0 }, ga: { s: 0, m: 0 }, hits: { s: 0, m: 0 }, pim: { s: 0, m: 0 } };
      matches.forEach(m => {
        tStats.sog.s += m.bjorkloven.totals.sog; tStats.hits.s += m.bjorkloven.totals.hits;
        tStats.pim.s += m.bjorkloven.totals.pim; tStats.ga.s += m.result.opponent;
      });
      const n = Math.max(matches.length, 1);
      ['sog', 'ga', 'hits', 'pim'].forEach(k => tStats[k].s /= n);

      const last3 = matches.slice(-3);
      last3.forEach(m => {
        tStats.sog.m += m.bjorkloven.totals.sog; tStats.hits.m += m.bjorkloven.totals.hits;
        tStats.pim.m += m.bjorkloven.totals.pim; tStats.ga.m += m.result.opponent;
      });
      const n3 = Math.max(last3.length, 1);

      const MomentumStat = ({ label, stat, invert = false }) => {
        const m = tStats[stat].m, s = tStats[stat].s;

                    <div className="text-bjork-gold text-lg font-display">{pct(sel.totals.fow, sel.totals.fow + sel.totals.fol).toFixed(1)}%</div>

    function renderMd(text) {
      if (!text) return '';
      return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/^### (.*$)/gm, '<h3>$1</h3>')
        .replace(/^## (.*$)/gm, '<h2 style="color:#E8B75E;font-size:1.2em;margin:12px 0 6px">$1</h2>')
        .replace(/^- (.*$)/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
        .replace(/\n/g, '<br />');
    }

    function AIView({ matches, players, apiKey, onSetKey }) {
      const [key, setKey] = useState(apiKey || '');
      const [msgs, setMsgs] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const chatRef = useRef();
      const hasKey = !!apiKey;

      const chips = ['Vem var matchens bästa spelare?', 'Vilken kedja underpresterade?', 'Jämför vår boxplay med motståndarens',
        'Ge en sammanfattning av säsongen hittills', 'Vilka spelare har bäst trend?'];

      const buildContext = () => {
        let ctx = `Du är en hockeyanalytiker för IF Björklöven. Slutspelet 2026.\n`;
        ctx += `Antal matcher spelade: ${matches.length}\n`;
        matches.forEach(m => {
          ctx += `\nMatch: Björklöven ${m.result.bjorkloven}-${m.result.opponent} ${m.opponent} (${m.date})\n`;
          ctx += `Björklöven SOG:${m.bjorkloven.totals.sog} Hits:${m.bjorkloven.totals.hits} PIM:${m.bjorkloven.totals.pim} PPG:${m.bjorkloven.totals.ppg} FOW%:${m.bjorkloven.totals.foPct.toFixed(1)}\n`;
          ctx += `${m.opponent} SOG:${m.opponentTeam.totals.sog} Hits:${m.opponentTeam.totals.hits} PIM:${m.opponentTeam.totals.pim}\n`;
          ctx += `Björklöven spelare:\n`;
          m.bjorkloven.skaters.forEach(s => { ctx += `  ${s.name}(#${s.number},${s.pos},L${s.line}): ${s.goals}G ${s.assists}A ${s.points}P ${s.sog}SOG ${s.plusMinus > 0 ? '+' : ''}${s.plusMinus} ${s.hits}H ${s.toi}TOI`; if (s.pos === 'CE') ctx += ` FO:${s.fow}/${s.fow + s.fol}`; ctx += '\n'; });
          m.bjorkloven.goalies.forEach(g => { ctx += `  ${g.name}(#${g.number},GK): SVS%:${Number(g.svsPct).toFixed(1)} SVS:${g.svs} GA:${g.ga}\n`; });
        });
        if (players.length) {
          ctx += `\nSäsongstotaler:\n`;
          players.filter(p => p.pos !== 'GK').sort((a, b) => b.totals.points - a.totals.points).slice(0, 15).forEach(p => {
            ctx += `${p.name}: ${p.totals.goals}G ${p.totals.assists}A ${p.totals.points}P i ${p.gamesPlayed} matcher\n`;
          });
        }
        return ctx;
      };

      const send = async (text) => {
        if (!text.trim() || !apiKey) return;
        const userMsg = { role: 'user', text };
        setMsgs(prev => [...prev, userMsg]); setInput(''); setLoading(true);
        try {
          const { GoogleGenerativeAI } = await import('https://esm.run/@google/generative-ai');
          const genAI = new GoogleGenerativeAI(apiKey);
          const model = genAI.getGenerativeModel({ model: 'gemini-2.0-flash' });
          const ctx = buildContext();
          const history = msgs.map(m => ({ role: m.role === 'user' ? 'user' : 'model', parts: [{ text: m.text }] }));
          const chat = model.startChat({ history, systemInstruction: { parts: [{ text: `${ctx}\n\nSvara på svenska. Använd markdown-formattering med tabeller och listor där det är relevant. Var konkret och basera analysen på de faktiska siffrorna ovan.` }] } });
          const result = await chat.sendMessage(text);
          setMsgs(prev => [...prev, { role: 'assistant', text: result.response.text() }]);
        } catch (e) { setMsgs(prev => [...prev, { role: 'assistant', text: `❌ Fel: ${e.message}` }]); }
        setLoading(false);
        setTimeout(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, 100);
      };

      if (!hasKey) return (<div className="animate-fade max-w-lg mx-auto mt-12">
        <div className="glass rounded-2xl p-8 text-center">
          <div className="text-4xl mb-4">🤖</div>
          <h3 className="font-display text-xl text-bjork-gold mb-2">AI-analysassistent</h3>
          <p className="text-gray-400 text-sm mb-6">Ange din Gemini API-nyckel för att aktivera AI-driven matchanalys</p>
          <input type="password" placeholder="Gemini API-nyckel..." value={key} onChange={e => setKey(e.target.value)}
            className="w-full bg-bjork-surface border border-bjork-surface-light rounded-lg px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-bjork-gold mb-4" />
          <button onClick={() => { if (key.trim()) onSetKey(key.trim()); }}
            className="w-full bg-bjork-gold text-bjork-bg font-semibold py-3 rounded-lg hover:bg-bjork-gold-light transition">Aktivera AI-analys</button>
          <p className="text-gray-600 text-xs mt-3">Nyckeln sparas lokalt i din webbläsare</p>
        </div>
      </div>);

      return (<div className="animate-fade space-y-4">
        <div className="flex items-center justify-between">
          <h3 className="font-display text-lg text-bjork-gold">AI-analysassistent</h3>
          <button onClick={() => { onSetKey(''); setMsgs([]); }} className="text-xs text-gray-500 hover:text-red-400 transition">Byt API-nyckel</button>
        </div>
        <div className="flex gap-2 flex-wrap">
          {chips.map((c, i) => <button key={i} onClick={() => send(c)} className="chip">{c}</button>)}
        </div>
        <div ref={chatRef} className="glass rounded-2xl p-5 h-[400px] overflow-y-auto space-y-4">
          {msgs.length === 0 && <div className="text-center text-gray-500 mt-16"><p>Ställ en fråga eller klicka på ett förslag ovan</p></div>}
          {msgs.map((m, i) => (
            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
              <div className={`max-w-[80%] rounded-xl px-4 py-3 text-sm ${m.role === 'user' ? 'bg-bjork-gold/20 text-bjork-gold' : 'bg-bjork-surface-light/50 text-gray-200'}`}>
                {m.role === 'user' ? m.text : <div className="markdown-content" dangerouslySetInnerHTML={{ __html: renderMd(m.text) }} />}
              </div>
            </div>
          ))}
          {loading && <div className="flex justify-start"><div className="bg-bjork-surface-light/50 rounded-xl px-4 py-3 text-sm text-gray-400 animate-pulse">Analyserar...</div></div>}
        </div>
        <div className="flex gap-2">
          <input type="text" value={input} onChange={e => setInput(e.target.value)} placeholder="Ställ en fråga om matcherna..."
            onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(input); } }}
            className="flex-1 bg-bjork-surface border border-bjork-surface-light rounded-lg px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-bjork-gold" />
          <button onClick={() => send(input)} disabled={loading || !input.trim()}
            className="bg-bjork-gold text-bjork-bg font-semibold px-6 py-3 rounded-lg hover:bg-bjork-gold-light transition disabled:opacity-50">Skicka</button>
        </div>
      </div>);
    }

    // ===== TAB 5: COMPARE =====
    function CompareView({ players }) {
      const skaters = useMemo(() => players.filter(p => p.pos !== 'GK'), [players]);
      const [p1, setP1] = useState('');

      const s1 = skaters.find(p => p.playerId === p1);
      const s2 = skaters.find(p => p.playerId === p2);
      const metrics = [
        { k: 'goals', l: 'Mål' }, { k: 'assists', l: 'Assist' }, { k: 'points', l: 'Poäng' },
        { k: 'sog', l: 'SOG' }, { k: 'plusMinus', l: '+/-' }, { k: 'hits', l: 'Hits' }, { k: 'pim', l: 'PIM' }

      return (<div className="animate-fade space-y-6">
        <h3 className="font-display text-lg text-bjork-gold">Spelarjämförelse</h3>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <select value={p1} onChange={e => setP1(e.target.value)} className="bg-bjork-surface border border-bjork-surface-light rounded-lg px-4 py-2 text-sm text-gray-200">
            <option value="">Välj spelare 1...</option>
            {skaters.map(p => <option key={p.playerId} value={p.playerId}>#{p.number} {p.name} ({p.pos})</option>)}
          </select>
          <select value={p2} onChange={e => setP2(e.target.value)} className="bg-bjork-surface border border-bjork-surface-light rounded-lg px-4 py-2 text-sm text-gray-200">
            <option value="">Välj spelare 2...</option>
            {skaters.map(p => <option key={p.playerId} value={p.playerId}>#{p.number} {p.name} ({p.pos})</option>)}
          </select>
        </div>
        {s1 && s2 && <>
          {/* Side-by-side stats */}
          <div className="glass rounded-2xl p-5">
            <div className="grid grid-cols-3 gap-2 text-center mb-4">
              <div className="font-display text-bjork-gold">#{s1.number} {s1.name}<br /><span className={`role-badge ${classifyRole(s1).css}`}>{classifyRole(s1).role}</span></div>
              <div className="font-display text-gray-400">VS</div>
              <div className="font-display text-blue-400">#{s2.number} {s2.name}<br /><span className={`role-badge ${classifyRole(s2).css}`}>{classifyRole(s2).role}</span></div>
            </div>
            {metrics.map(m => {
              const v1 = s1.totals[m.k] || 0, v2 = s2.totals[m.k] || 0;
              const max = Math.max(Math.abs(v1), Math.abs(v2), 1);
              const lead1 = v1 > v2, lead2 = v2 > v1;
              return (<div key={m.k} className="grid grid-cols-[1fr_80px_1fr] gap-2 items-center py-2 border-t border-bjork-surface-light/20">
                <div className="flex items-center justify-end gap-2">
                  <span className={`text-sm ${lead1 ? 'compare-leader text-bjork-gold' : 'text-gray-400'}`}>{v1}</span>
                  <div className="w-24 h-1.5 rounded bg-bjork-surface-light/30"><div className="h-full rounded" style={{ width: `${Math.abs(v1) / max * 100}%`, background: lead1 ? GOLD : MUTED, float: 'right' }}></div></div>
                </div>
                <div className="text-center text-xs text-gray-500 font-semibold">{m.l}</div>
                <div className="flex items-center gap-2">
                  <div className="w-24 h-1.5 rounded bg-bjork-surface-light/30"><div className="h-full rounded" style={{ width: `${Math.abs(v2) / max * 100}%`, background: lead2 ? BLUE : MUTED }}></div></div>
                  <span className={`text-sm ${lead2 ? 'compare-leader text-blue-400' : 'text-gray-400'}`}>{v2}</span>
                </div>
              </div>);
            })}
            {/* Advanced per-60 comparison */}
            {(() => {
              const a1 = calcAdvanced(s1), a2 = calcAdvanced(s2); const advMetrics = [
                { l: 'P/60', v1: a1.p60, v2: a2.p60 }, { l: 'SOG/60', v1: a1.sog60, v2: a2.sog60 },
                { l: 'Hits/60', v1: a1.hits60, v2: a2.hits60 }, { l: 'SH%', v1: a1.shPct, v2: a2.shPct }
              ];
              return advMetrics.map(m => {
                const v1 = Number(m.v1), v2 = Number(m.v2), max = Math.max(v1, v2, 0.1);
                return (<div key={m.l} className="grid grid-cols-[1fr_80px_1fr] gap-2 items-center py-2 border-t border-bjork-surface-light/20">
                  <div className="flex items-center justify-end gap-2">
                    <span className={`text-sm ${v1 > v2 ? 'compare-leader text-bjork-gold' : 'text-gray-400'}`}>{m.v1}</span>
                    <div className="w-24 h-1.5 rounded bg-bjork-surface-light/30"><div className="h-full rounded" style={{ width: `${v1 / max * 100}%`, background: v1 > v2 ? GOLD : MUTED, float: 'right' }}></div></div>
                  </div>
                  <div className="text-center text-xs text-gray-500 font-semibold">{m.l}</div>
                  <div className="flex items-center gap-2">
                    <div className="w-24 h-1.5 rounded bg-bjork-surface-light/30"><div className="h-full rounded" style={{ width: `${v2 / max * 100}%`, background: v2 > v1 ? BLUE : MUTED }}></div></div>
                    <span className={`text-sm ${v2 > v1 ? 'compare-leader text-blue-400' : 'text-gray-400'}`}>{m.v2}</span>
                  </div>
                </div>);
              });
            })()}
          </div>
          {/* Dual Radar */}
          <div className="glass rounded-2xl p-5">
            <h4 className="text-sm text-gray-400 mb-3">Profilöverlagring</h4>
            <ResponsiveContainer width="100%" height={300}>
              <RadarChart data={radarData(s1, players).map((d, i) => ({ ...d, value2: radarData(s2, players)[i]?.value || 0 }))}>
                <PolarGrid stroke={SURF_L} />
                <PolarAngleAxis dataKey="stat" stroke={MUTED} fontSize={11} />
                <PolarRadiusAxis domain={[0, 100]} tick={false} axisLine={false} />

                <Radar name={s2.name} dataKey="value2" stroke={BLUE} fill={BLUE} fillOpacity={0.2} strokeWidth={2} />
                <Legend wrapperStyle={{ fontSize: 12 }} />
                <Tooltip {...TT} />
              </RadarChart>
            </ResponsiveContainer>
          </div>
        </>}
      </div>);
    }

    // ===== APP SHELL =====
    const TABS = [{ id: 'match', label: 'Matchanalys', icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' },
    { id: 'season', label: 'Säsong', icon: 'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' },
    { id: 'players', label: 'Spelare', icon: 'M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z' },
    { id: 'compare', label: 'Jämför', icon: 'M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4' },
    { id: 'ai', label: 'AI-analys', icon: 'M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z' }];

    function App() {
      const [matches, setMatches] = useState([]);
      const [players, setPlayers] = useState([]);
      const [tab, setTab] = useState('match');
      const [selMatch, setSelMatch] = useState(null);
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(true);
      const [apiKey, setApiKeyState] = useState(loadApiKey);

      const loadData = useCallback(async () => {
        try {
          const [m, p] = await Promise.all([fetchMatches(), fetchPlayers()]);
          setMatches(m);
          setPlayers(p);
          if (m.length && !selMatch) setSelMatch(m[m.length - 1].id);
        } catch (e) { setError(e.message); }
        setLoading(false);
      }, []);

      useEffect(() => { loadData(); }, [loadData]);

      // Poll for new data every 10 seconds
      useEffect(() => {
        const interval = setInterval(() => {
          fetchMatches().then(m => {

              setMatches(m);
              fetchPlayers().then(setPlayers).catch(() => { });
              if (m.length && !selMatch) setSelMatch(m[m.length - 1].id);
            }
          }).catch(() => { });
        }, 10000);
        return () => clearInterval(interval);
      }, [matches.length, selMatch]);

        if (!confirm('Rensa all data?')) return;
        try { await apiClear(); setMatches([]); setPlayers([]); setSelMatch(null); }

            {TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                className={`flex items-center gap-2 px-4 py-3 text-sm font-medium transition whitespace-nowrap ${tab === t.id ? 'tab-active' : 'text-gray-400 hover:text-gray-200'}`}>
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={t.icon} /></svg>
                {t.label}
              </button>
            ))}
          </div>
        </nav>

        {/* ERRORS */}
        {error && <div className="max-w-7xl mx-auto px-4 md:px-8 mt-4">
          <div className="bg-red-500/10 border border-red-500/30 rounded-lg p-3 text-red-400 text-sm flex items-start gap-2">
            <span className="shrink-0 mt-0.5">⚠️</span><div><pre className="whitespace-pre-wrap">{error}</pre>
              <button onClick={() => setError('')} className="text-xs underline mt-1">Stäng</button></div>
          </div>
        </div>}
        {loading && <div className="max-w-7xl mx-auto px-4 md:px-8 mt-4"><div className="text-bjork-gold text-sm animate-pulse">Hämtar data från servern...</div></div>}

        {/* CONTENT */}
        <main className="max-w-7xl mx-auto px-4 md:px-8 py-6">
          {matches.length === 0 && !loading && tab !== 'ai' ?
            <EmptyState title="Ingen data" desc="Lägg Excel-filer i excel_data/ mappen så importeras de automatiskt" /> :
            <>
              {tab === 'match' && <MatchView matches={matches} selId={selMatch} onSel={setSelMatch} />}
              {tab === 'season' && <SeasonView matches={matches} players={players} />}
              {tab === 'players' && <PlayerView players={players} matches={matches} />}
              {tab === 'compare' && <CompareView players={players} />}
              {tab === 'ai' && <AIView matches={matches} players={players} apiKey={apiKey} onSetKey={handleSetKey} />}
            </>
          }
        </main>

        <footer className="text-center py-6 text-xs text-gray-600 border-t border-bjork-surface-light/20">
          Björklöven Stats Hub &middot; Slutspel 2026 &middot; Node.js + SQLite + React
        </footer>
      </div>);
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
